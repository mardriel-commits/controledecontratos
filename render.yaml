databases:
  - name: sebrae-contratos-db
    plan: free

services:
  # API (Flask)
  - type: web
    name: sebrae-contratos-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sebrae-contratos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: TZ
        value: America/Maceio
      - key: PYTHON_VERSION
        value: 3.11.9

  # Frontend (Static Site)
  - type: web
    name: sebrae-contratos-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://sebrae-contratos-api.onrender.com/api
    # IMPORTANTE: não use "plan" no static
