databases:
  - name: sebrae-contratos-db
    plan: free

services:
  # 1) API (Flask)
  - type: web
    name: sebrae-contratos-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sebrae-contratos-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://SEU-FRONTEND.onrender.com

  # 2) Frontend (Static Site)
  - type: web
    name: sebrae-contratos-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://SEU-BACKEND.onrender.com/api
