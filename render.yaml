databases:
  - name: sebrae-contratos-db
    plan: free

services:
  - type: web
    name: sebrae-contratos-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sebrae-contratos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_DAYS
        value: "7"
      - key: COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
      - key: TZ
        value: America/Maceio
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: sebrae-contratos-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        value: https://sebrae-contratos-api.onrender.com
