services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sebrae_contratos
      POSTGRES_USER: sebrae
      POSTGRES_PASSWORD: sebrae
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://sebrae:sebrae@db:5432/sebrae_contratos
      SECRET_KEY: dev-secret
    ports:
      - "5000:5000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  pgdata:
